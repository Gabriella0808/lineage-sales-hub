<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lineage Collections — Internal Portal</title>
    <meta name="description" content="Lineage Collections internal operating system for sales, dealers, inventory, and operations." />
    <meta name="author" content="Lineage Collections" />
    <meta name="theme-color" content="#1a2233" />

    <!-- Prevent caching in preview/dev -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lineage" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lineage Collections — Internal Portal" />
    <meta property="og:description" content="Internal operating system for the Lineage Collections team." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lineage Collections — Internal Portal" />
    <meta name="twitter:description" content="Internal operating system for the Lineage Collections team." />

    <!-- Aggressive cache/SW purge in preview environments -->
    <script>
      (function() {
        const host = location.hostname;
        const isPreview = host.includes('id-preview--') || host.includes('preview--') || host.endsWith('lovableproject.com') || host.endsWith('lovableproject-dev.com') || host === 'localhost' || host === '127.0.0.1';
        if (!isPreview) return;
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(n) { caches.delete(n); });
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
